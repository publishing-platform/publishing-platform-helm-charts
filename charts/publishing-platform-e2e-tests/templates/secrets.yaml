apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: test-signon-account
  annotations:
    kubernetes.io/description: >
      Email address and password for the Signon account which Publishing Platform E2E tests uses when
      testing apps. Field names are `email` and `password`.
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    deletionPolicy: {{ .Values.externalSecrets.deletionPolicy }}
    name: test-signon-account
  dataFrom:
    - extract:
        key: publishing-platform/e2e-tests/signon-account
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None