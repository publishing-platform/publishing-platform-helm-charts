# Values for Asset-manager Rails application.

service:
  type: NodePort
  annotations: {}
  port: 80

ingress:
  enabled: false

# appEnabled determines whether the web app Deployment is created.
appEnabled: true
replicaCount: 1
podDisruptionBudget: {}

workers:
  enabled: true
  replicaCount: 1

repoName: "example"  # Dummy value, overridden in ArgoCD config.

arch: amd64
appImage:
  repository: "132456789.dkr.ecr.eu-west-2.amazonaws.com/github/publishing-platform/asset-manager" # Dummy value, overridden in ArgoCD config.
  tag: latest
appPort: 3000

# appExtraVolumeMounts defines VolumeMounts on the app container (in both
# deployment.yaml and worker-deployment.yaml).
appExtraVolumeMounts: []

# appProbes defines liveness/readiness/startup probes for the app container.
# See templates/deployment.yaml file for the default values.
# When overriding these probes, you must override all three probes if you need
# them - the whole block is replaced.
appProbes: {}

nginxImage:
  repository: public.ecr.aws/nginx/nginx
  pullPolicy: Always
  tag: stable
nginxPort: 8080
nginxProxyConnectTimeout: 2s
nginxProxyReadTimeout: 60s
nginxConfigMap:
  create: true
nginxExtraVolumeMounts: []

appResources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 700Mi

workerResources:
  limits:
    cpu: 1000m
    memory: 2500Mi
  requests:
    cpu: 200m
    memory: 700Mi

# freshclamResources:
#   limits:
#     cpu: 1000m
#     memory: 1Gi
#   requests:
#     cpu: 200m
#     memory: 500Mi

# clamdResources:
#   limits:
#     cpu: 2000m
#     memory: 4Gi
#   requests:
#     cpu: 500m
#     memory: 2000Mi

freshclamResources:
  limits:
    cpu: 500m
    memory: 500Mi
  requests:
    cpu: 100m
    memory: 200Mi

clamdResources:
  limits:
    cpu: 500m
    memory: 500Mi
  requests:
    cpu: 100m
    memory: 200Mi

# clamMountConfigPath is the path to which the clamav.conf and freshclam.conf are mounted
clamMountConfigPath: "/usr/local/etc"

# assetManagerNFS is the address of the NFSv4 (or Amazon EFS) server where uploaded
assetManagerNFS: "asset-manager-efs.dev.publishing-platform.co.uk"

# dnsConfig is passed directly into the pod specs in the app and worker
# deployment templates.
dnsConfig: {}

# extraEnv is a list of (name, value) pairs representing additional environment
# variables to pass to app containers. extraEnv is evaluated through `tpl`, so
# Helm values can be substituted using Go template syntax. Use sparingly.
extraEnv: {}
#  - name: RETICULATE_SPLINES
#    value: "true"
#  - name: SPLINE_SERVER
#    value: "https://splines.{{ .Values.externalDomain }}"

metricsPort: 9394

sentry:
  enabled: true
  createSecret: true

rails:
  enabled: true
  createKeyBaseSecret: true

externalSecrets:
  deletionPolicy: Delete
  refreshInterval: 1h  # Be kind to etcd and don't set this too short.

# redis.enabled controls whether a Redis database is set up for the app
# REDIS_URL is automatically set unless redis.redisUrlOverride values are provided
redis:
  enabled: true
  image:
    repository: redis
    tag: "7.4"
    pullPolicy: Always
  storageClassName: ebs-gp3
  storage: 10Gi
  resources:
    limits:
      cpu: 1
      memory: 1500Mi
    requests:
      cpu: 500m
      memory: 500Mi
  config:
    # Needs to be smaller that the memory limit with some buffer
    maxmemory: 1000mb
  redisUrlOverride:
    app: ""
    workers: ""

nfs:
  clamAvStorage: 15Gi
  assetStorage: 15Gi
