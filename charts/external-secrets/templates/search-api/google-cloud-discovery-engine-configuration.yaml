apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: search-api-google-cloud-discovery-engine-configuration
  labels:
    {{- include "external-secrets.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/description: >
      Secrets for Google Cloud Discovery Engine for search-api
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    deletionPolicy: {{ .Values.externalSecrets.deletionPolicy }}
    name: search-api-google-cloud-discovery-engine-configuration
  dataFrom:
    - extract:
        key: publishing-platform/search-api/google-cloud-discovery-engine-configuration
