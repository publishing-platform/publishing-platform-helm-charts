apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: asset-manager
  labels:
    {{- include "external-secrets.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/description: >
      Secrets for Asset Manager
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    deletionPolicy: {{ .Values.externalSecrets.deletionPolicy }}
    name: asset-manager
    template:
      mergePolicy: Merge
      engineVersion: v2    
      data:
        DATABASE_URL: '{{ $.Files.Get "externalsecrets-templates/psql-conn-string.tpl" | trim }}/asset_manager_production'
  dataFrom:
    - extract:
        key: publishing-platform/asset-manager
